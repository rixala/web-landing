<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rixala - Инновационные решения</title>
    
    <!-- Подключение Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Подключение иконок Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Кастомные стили для анимаций (замена framer-motion) -->
    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-fade-in-up {
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        /* Задержки для анимаций */
        .delay-200 { animation-delay: 0.2s; }
        .delay-400 { animation-delay: 0.4s; }
        .delay-800 { animation-delay: 0.8s; }
        .delay-1000 { animation-delay: 1s; }
    </style>
</head>
<body>
    <div class="min-h-screen bg-slate-950 flex flex-col items-center justify-center relative overflow-hidden font-sans text-slate-200">
      
        <!-- Абстрактный фоновый элемент -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-blue-600/20 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute top-1/3 left-1/3 -translate-x-1/2 -translate-y-1/2 w-72 h-72 bg-purple-600/20 rounded-full blur-3xl pointer-events-none"></div>

        <!-- Основной контент -->
        <main class="z-10 flex flex-col items-center text-center px-6 max-w-2xl w-full">
            
            <!-- Заголовок -->
            <div class="animate-fade-in-up">
                <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
                    rixala
                </h1>
            </div>

            <!-- Подзаголовок -->
            <div class="animate-fade-in-up delay-200">
                <p class="text-lg md:text-xl text-slate-400 mb-8 max-w-md mx-auto">
                    Инновационные решения в разработке. <br/> Мы готовим что-то особенное.
                </p>
            </div>

            <!-- Форма подписки -->
            <div class="animate-fade-in-up delay-400 w-full max-w-sm mb-12">
                <form class="flex items-center bg-slate-900 border border-slate-800 rounded-full p-1 overflow-hidden" onsubmit="event.preventDefault();">
                    <input 
                        type="email" 
                        placeholder="Ваш email для новостей..." 
                        class="bg-transparent border-none outline-none text-sm px-4 py-2 w-full text-slate-200 placeholder-slate-500"
                        required
                    />
                    <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-full text-sm font-medium transition-colors">
                        Узнать первым
                    </button>
                </form>
            </div>

            <!-- Социальные сети -->
            <div class="animate-fade-in delay-800 flex flex-wrap justify-center gap-6 max-w-lg">
                <a href="https://t.me/rixala_official" target="_blank" class="text-slate-500 hover:text-blue-400 transition-colors" aria-label="Telegram">
                    <i data-lucide="send" class="w-6 h-6"></i>
                </a>
                <a href="https://www.instagram.com/rixala_official" target="_blank" class="text-slate-500 hover:text-pink-500 transition-colors" aria-label="Instagram">
                    <i data-lucide="instagram" class="w-6 h-6"></i>
                </a>
                <a href="https://www.tiktok.com/@rixala" target="_blank" class="text-slate-500 hover:text-white transition-colors" aria-label="TikTok">
                    <!-- Кастомная иконка TikTok -->
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5" />
                    </svg>
                </a>
                <a href="https://www.linkedin.com/company/rixala_official" target="_blank" class="text-slate-500 hover:text-blue-500 transition-colors" aria-label="LinkedIn">
                    <i data-lucide="linkedin" class="w-6 h-6"></i>
                </a>
                <a href="https://www.facebook.com/rixalaofficial" target="_blank" class="text-slate-500 hover:text-blue-600 transition-colors" aria-label="Facebook">
                    <i data-lucide="facebook" class="w-6 h-6"></i>
                </a>
                <a href="https://www.twitter.com/rixala_official" target="_blank" class="text-slate-500 hover:text-blue-400 transition-colors" aria-label="Twitter">
                    <i data-lucide="twitter" class="w-6 h-6"></i>
                </a>
                <a href="https://www.github.com/rixala" target="_blank" class="text-slate-500 hover:text-white transition-colors" aria-label="GitHub">
                    <i data-lucide="github" class="w-6 h-6"></i>
                </a>
                <a href="https://www.rixala.com" target="_blank" class="text-slate-500 hover:text-blue-400 transition-colors" aria-label="Website">
                    <i data-lucide="globe" class="w-6 h-6"></i>
                </a>
                <a href="mailto:hello@rixala.com" class="text-slate-500 hover:text-blue-400 transition-colors" aria-label="Email">
                    <i data-lucide="mail" class="w-6 h-6"></i>
                </a>
            </div>
        </main>

        <!-- Футер -->
        <footer class="animate-fade-in delay-1000 absolute bottom-6 text-sm text-slate-600">
            © <span id="current-year"></span> rixala. Все права защищены.
        </footer>
    </div>

    <!-- Скрипты инициализации -->
    <script>
        // Инициализация иконок Lucide
        lucide.createIcons();

        // Установка текущего года в футере
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
